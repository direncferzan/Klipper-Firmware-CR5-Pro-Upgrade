[include mainsail.cfg]

[mcu]
serial: /dev/serial/by-id/WRITE_YOUR_ID_NUMBER_HERE

restart_method: command

[printer]
kinematics: cartesian
max_velocity: 150
max_accel: 1000
max_z_velocity: 5
max_z_accel: 100

[stepper_x]
step_pin: PB13
dir_pin: !PB12           
enable_pin: !PB14
microsteps: 16            
rotation_distance: 40    
endstop_pin: ^!PC0
position_endstop: 0
position_max: 380        
homing_speed: 40

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
stealthchop_threshold: 999999

[stepper_y]
step_pin: PB10
dir_pin: !PB2            
enable_pin: !PB11
microsteps: 16            
rotation_distance: 40    
endstop_pin: ^!PC1
position_endstop: 0
position_max: 315        
homing_speed: 40

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580
stealthchop_threshold: 999999

[stepper_z]
step_pin: PB0
dir_pin: !PC5            
enable_pin: !PB1
microsteps: 16
rotation_distance: 4    
endstop_pin: probe:z_virtual_endstop
position_max: 380
position_min: -5
homing_speed: 5

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580
stealthchop_threshold: 999999

[bltouch]
sensor_pin: ^PC2        
control_pin: PA1        
x_offset: 45            
y_offset: -10
#z_offset: 2             
probe_with_touch_mode: True
stow_on_each_sample: False

[safe_z_home]
home_xy_position: 142, 120 
speed: 50
z_hop: 15                 
z_hop_speed: 5

[bed_mesh]
speed: 100
horizontal_move_z: 10
mesh_min: 70, 70
mesh_max: 260, 200
probe_count: 5, 5        
mesh_pps: 2, 2
algorithm: bicubic

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD1
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.400
filament_diameter: 1.750 
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
min_temp: 0
max_temp: 300
max_extrude_only_distance: 100.0

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.650
stealthchop_threshold: 999999

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 110

[output_pin anakart_fani]
pin: PB15
value: 1

[fan]
pin: PC6

[heater_fan kafa_sogutucu]
pin: PC7
heater: extruder
heater_temp: 50.0

[gcode_macro LOAD_FILAMENT]
gcode:
    G91                    
    G92 E0                 
    G1 E20 F300            
    G92 E0                 
    G90

# --- PROFESYONEL AKILLI MAKROLAR ---

[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}
    M140 S{BED_TEMP} ; Tablayı ısıt
    M104 S{EXTRUDER_TEMP} ; Nozulu ısıt
    G28 ; Home
    BED_MESH_PROFILE LOAD=default ; Mesh yükle
    M190 S{BED_TEMP} ; Tabla ısınana kadar bekle
    M109 S{EXTRUDER_TEMP} ; Nozul ısınana kadar bekle
    G1 Z5 F3000
    G92 E0
    G1 X5 Y20 Z0.3 F5000
    G1 X100 E20 F1000 ; Purge hattı
    G92 E0

[gcode_macro PRINT_END]
gcode:
    M140 S0
    M104 S0
    M106 S0
    G91
    G1 E-2 Z10 F2700
    G90
    G1 X0 Y200 F3000 ; Güvenli park
    M84 ; Motorları boşalt

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    G91
    G1 E-2 Z10 F2700
    G90
    G1 X0 Y200 F3000
    BASE_PAUSE

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    G91
    G1 E2 F2700
    G90
    BASE_RESUME

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
gcode:
    G91
    G1 Z10 E-2 F2700
    G90
    G1 X0 Y200 F3000 ; Çarpma önleyici park
    BASE_CANCEL_PRINT
    M106 S0
    M104 S0
    M140 S0

